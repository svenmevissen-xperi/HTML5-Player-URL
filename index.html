<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DASH Playback Verification (contrib-dash)</title>
  <link href="https://vjs.zencdn.net/8.16.1/video-js.css" rel="stylesheet" />
  <style>
    body { margin:0; background:#111; color:#eee; font-family:Arial,sans-serif; display:grid; place-items:center; min-height:100vh; }
    .wrap { width:min(1200px,96vw); }
    .video-js { width:100%; aspect-ratio:16/9; background:#000; }
    .meta { margin-top:10px; font-size:12px; color:#bbb; word-break:break-all; }
    #log { margin-top:10px; font:12px/1.4 monospace; white-space:pre-wrap; color:#9ad; }
  </style>
</head>
<body>
  <div class="wrap">
    <video id="dash-player" class="video-js vjs-default-skin" controls autoplay muted playsinline preload="auto"></video>
    <div class="meta">Source: <span id="src-label"></span></div>
    <div id="log"></div>
  </div>

  <script src="https://vjs.zencdn.net/8.16.1/video.min.js"></script>
  <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/videojs-contrib-dash@5/dist/videojs-dash.min.js"></script>

  <script>
    const src = "https://ps-test-vod.cdn.vustreams.com/vizio-poc/dd6a03e2-d526-41c0-b679-7dddb73ad0bd/noscte-nodrm.ism/.mpd";
    const logEl = document.getElementById("log");
    const log = (...a) => { console.log(...a); logEl.textContent += a.map(x => typeof x === "string" ? x : JSON.stringify(x)).join(" ") + "\n"; };
    document.getElementById("src-label").textContent = src;

    const player = videojs("dash-player", {
      fluid: true,
      html5: {
        dash: {
        }
      }
    });

    player.on("error", () => {
      const e = player.error();
      log("VIDEOJS ERROR", e ? `code=${e.code} message=${e.message}` : "unknown");
    });

    player.ready(() => {
      player.src({ src, type: "application/dash+xml" });
      player.play().catch(err => log("play() rejected:", err?.message || err));
    });
  </script>
</body>
</html>
